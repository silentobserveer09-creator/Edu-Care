<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edu Care | Premium Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --surface: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; padding-bottom: 140px; overflow-x: hidden; }
        .gradient-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border-radius: 0 0 40px 40px; }
        .glass { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 24px; }
        .page-transition { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-item:active { transform: scale(0.95); transition: 0.2s; }
        #slider-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-img { min-width: 100%; height: 180px; object-fit: cover; border-radius: 24px; }
        .nav-capsule { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: #0f172a; border-radius: 100px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: #fff; }
        .section { display: none; } .section.active { display: block; }
        .ticker-container { position: fixed; bottom: 105px; width: 100%; background: #fff; border-top: 1px solid #f1f5f9; padding: 10px 0; z-index: 99; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; font-weight: 600; color: #6366f1; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .info-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 2000; display: none; overflow-y: auto; padding: 25px; }
        .info-overlay.active { display: block; animation: overlayUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes overlayUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="gradient-header pt-12 pb-24 px-6 text-white relative">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold">Edu Care</h1>
                <p class="text-indigo-100 text-sm">Empowering Odisha's Students</p>
            </div>
            <button onclick="navigateTo('notices')" class="bg-white/20 p-3 rounded-2xl backdrop-blur-md active:scale-90 transition">
                <i data-lucide="bell" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main class="px-5 -mt-12">
        <!-- Dashboard -->
        <div id="dashboard" class="section active page-transition">
            <div class="glass overflow-hidden mb-8 h-[180px] shadow-xl">
                <div id="slider-wrapper"></div>
            </div>
            <div id="grid-container" class="grid grid-cols-2 gap-4">
                <div onclick="window.open('https://odia-tutor-solutions.netlify.app/')" class="grid-item glass p-5 flex flex-col items-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-3"><i data-lucide="book"></i></div>
                    <span class="text-sm font-bold">Solutions</span>
                </div>
                <div onclick="navigateTo('scholarships')" class="grid-item glass p-5 flex flex-col items-center">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mb-3"><i data-lucide="graduation-cap"></i></div>
                    <span class="text-sm font-bold">Scholarships</span>
                </div>
            </div>
        </div>

        <!-- Dynamic Grid View -->
        <div id="dynamic-view" class="section page-transition">
            <button onclick="window.history.back()" class="flex items-center gap-2 mb-6 font-bold text-indigo-600"><i data-lucide="chevron-left"></i> Back</button>
            <h2 id="dynamic-title" class="text-2xl font-bold mb-6">Section</h2>
            <div id="dynamic-content-list" class="space-y-4"></div>
        </div>

        <!-- Scholarships -->
        <div id="scholarships" class="section page-transition">
            <button onclick="window.history.back()" class="flex items-center gap-2 mb-6 font-bold text-indigo-600"><i data-lucide="chevron-left"></i> Back</button>
            <h2 class="text-2xl font-bold mb-6">Scholarships</h2>
            <div id="scholarship-list" class="space-y-6"></div>
        </div>

        <!-- Notices -->
        <div id="notices" class="section page-transition">
            <h2 class="text-2xl font-bold mb-6">Notice Board</h2>
            <div id="notice-list" class="space-y-4"></div>
        </div>

        <!-- Info -->
        <div id="info" class="section page-transition">
            <h2 class="text-2xl font-bold mb-6">Information</h2>
            <div class="glass p-6 space-y-4">
                <div onclick="openInfo('About Edu Care', 'Edu Care is Odisha\'s leading digital educational platform.')" class="flex justify-between items-center p-4 bg-white/50 rounded-2xl active:bg-indigo-50 transition">
                    <span class="flex items-center gap-3 font-semibold"><i data-lucide="info" class="w-5 h-5 text-indigo-500"></i> About Us</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
                <div onclick="openInfo('Privacy Policy', 'We value your privacy.')" class="flex justify-between items-center p-4 bg-white/50 rounded-2xl active:bg-indigo-50 transition">
                    <span class="flex items-center gap-3 font-semibold"><i data-lucide="shield-check" class="w-5 h-5 text-indigo-500"></i> Privacy Policy</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
                <div onclick="openInfo('Terms & Conditions', 'Educational use only.')" class="flex justify-between items-center p-4 bg-white/50 rounded-2xl active:bg-indigo-50 transition">
                    <span class="flex items-center gap-3 font-semibold"><i data-lucide="file-text" class="w-5 h-5 text-indigo-500"></i> Terms & Conditions</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
            </div>
        </div>
    </main>

    <div id="info-overlay" class="info-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 id="info-overlay-title" class="text-2xl font-bold text-indigo-600"></h2>
            <button onclick="closeInfo()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="info-overlay-content" class="text-slate-600 leading-relaxed text-lg"></div>
    </div>

    <div class="ticker-container"><div class="ticker-text" id="ticker-box">Connecting to Edu Care Database...</div></div>

    <nav class="nav-capsule">
        <div onclick="navigateTo('dashboard')" class="nav-link active" id="btn-dashboard"><i data-lucide="home"></i><span class="text-[10px] font-bold">Home</span></div>
        <div onclick="navigateTo('notices')" class="nav-link" id="btn-notices"><i data-lucide="bell"></i><span class="text-[10px] font-bold">Notice</span></div>
        <div onclick="navigateTo('info')" class="nav-link" id="btn-info"><i data-lucide="user"></i><span class="text-[10px] font-bold">Info</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDLqadfjNno17c7NqeO38l93IabAYcAl1c",
          authDomain: "edu-care-ada5e.firebaseapp.com",
          projectId: "edu-care-ada5e",
          storageBucket: "edu-care-ada5e.firebasestorage.app",
          messagingSenderId: "82331443866",
          appId: "1:82331443866:web:9ccd56f9c970aafaa37523",
          measurementId: "G-TNB42F3C50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.navigateTo = (id, data = null) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            let activeBtnId = id;
            if(id === 'scholarships' || id === 'dynamic-view') activeBtnId = 'dashboard';
            const activeBtn = document.getElementById('btn-' + activeBtnId);
            if(activeBtn) activeBtn.classList.add('active');
            if(id === 'dynamic-view' && data) renderDynamic(data);
            if(!history.state || history.state.section !== id) {
                history.pushState({ section: id, data: data }, '', '#' + id);
            }
            window.scrollTo(0,0);
        };

        window.onpopstate = (e) => {
            const section = e.state ? e.state.section : 'dashboard';
            const data = e.state ? e.state.data : null;
            navigateTo(section, data);
        };

        window.openInfo = (title, content) => {
            document.getElementById('info-overlay-title').innerText = title;
            document.getElementById('info-overlay-content').innerText = content;
            document.getElementById('info-overlay').classList.add('active');
        };
        window.closeInfo = () => document.getElementById('info-overlay').classList.remove('active');

        // Firestore Listeners
        onSnapshot(collection(db, "categories"), (snap) => {
            const grid = document.getElementById('grid-container');
            document.querySelectorAll('.dyn-cat').forEach(e => e.remove());
            snap.docs.forEach(doc => {
                const d = doc.data();
                const el = document.createElement('div');
                el.className = 'grid-item dyn-cat glass p-5 flex flex-col items-center';
                el.onclick = () => navigateTo('dynamic-view', { id: doc.id, title: d.title });
                el.innerHTML = `<div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-3"><i data-lucide="layout"></i></div><span class="text-sm font-bold text-center">${d.title}</span>`;
                grid.appendChild(el);
            });
            lucide.createIcons();
        });

        function renderDynamic(cat) {
            document.getElementById('dynamic-title').innerText = cat.title;
            const list = document.getElementById('dynamic-content-list');
            onSnapshot(query(collection(db, "dynamic_content"), where("categoryId", "==", cat.id)), (snap) => {
                list.innerHTML = snap.docs.map(d => `
                    <div class="glass overflow-hidden page-transition">
                        ${d.data().image ? `<img src="${d.data().image}" class="w-full h-40 object-cover">` : ''}
                        <div class="p-4"><h3 class="font-bold">${d.data().title}</h3><p class="text-sm opacity-70">${d.data().description}</p>
                        ${d.data().link ? `<a href="${d.data().link}" class="inline-block mt-3 text-indigo-600 font-bold">Open Link →</a>` : ''}</div>
                    </div>
                `).join('') || '<p class="text-center py-10 opacity-50">No content found</p>';
            });
        }

        onSnapshot(collection(db, "banners"), (snap) => {
            document.getElementById('slider-wrapper').innerHTML = snap.docs.map(d => `<img src="${d.data().imageUrl}" class="slide-img" onclick="window.open('${d.data().link}')">`).join('');
        });
        onSnapshot(query(collection(db, "notices"), orderBy("timestamp", "desc")), (snap) => {
            document.getElementById('notice-list').innerHTML = snap.docs.map(d => `<div class="glass p-5 border-l-4 border-indigo-500"><h3 class="font-bold">${d.data().title}</h3><p class="text-sm opacity-70 mt-1">${d.data().description}</p></div>`).join('');
        });
        onSnapshot(collection(db, "scholarships"), (snap) => {
            document.getElementById('scholarship-list').innerHTML = snap.docs.map(d => `<div class="glass overflow-hidden shadow-sm"><img src="${d.data().imageUrl}" class="w-full h-44 object-cover"><div class="p-5"><h3 class="font-bold text-lg">${d.data().title}</h3><a href="${d.data().link}" class="mt-4 block text-center py-3 bg-indigo-50 rounded-xl text-indigo-700 font-bold">Apply Now</a></div></div>`).join('');
        });
        onSnapshot(collection(db, "highlight"), (snap) => {
            if(!snap.empty) document.getElementById('ticker-box').innerText = snap.docs[0].data().text;
        });

        lucide.createIcons();
    </script>
</body>
</html>
